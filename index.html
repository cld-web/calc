<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Formulário com CEP e Web Storage</title>
  <script src="calculator.js" defer></script>
</head>
<body>
  <h2>Formulário de Endereço</h2>
  <form onsubmit="event.preventDefault(); salvarDados();">
    <label for="nome">Nome:</label><br>
    <input type="text" id="nome" name="nome"><br><br>

    <label for="cep">CEP:</label><br>
    <input type="text" id="cep" name="cep">
    <button type="button" onclick="buscarEndereco()">Buscar Endereço</button><br><br>

    <label for="logradouro">Logradouro:</label><br>
    <input type="text" id="logradouro" name="logradouro"><br><br>

    <label for="bairro">Bairro:</label><br>
    <input type="text" id="bairro" name="bairro"><br><br>

    <label for="cidade">Cidade:</label><br>
    <input type="text" id="cidade" name="cidade"><br><br>

    <label for="estado">Estado:</label><br>
    <input type="text" id="estado" name="estado"><br><br>

    <button type="submit">Salvar Dados</button>
  </form>
</body>
</html>
