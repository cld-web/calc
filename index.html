<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro com Busca de CEP</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        input { padding: 8px; margin-top: 5px; }
        button { padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Cadastro de Endereço</h2>
    <form id="cadastroForm">
        <div class="form-group">
            <label for="cep">CEP:</label>
            <input type="text" id="cep" placeholder="00000-000" maxlength="9" required>
        </div>
        <div class="form-group">
            <label for="logradouro">Rua/Logradouro:</label>
            <input type="text" id="logradouro" readonly>
        </div>
        <div class="form-group">
            <label for="bairro">Bairro:</label>
            <input type="text" id="bairro" readonly>
        </div>
        <div class="form-group">
            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" readonly>
        </div>
        <div class="form-group">
            <label for="uf">Estado (UF):</label>
            <input type="text" id="uf" readonly>
        </div>
        <div class="form-group">
            <label for="numero">Número:</label>
            <input type="text" id="numero" required>
        </div>
        
        <button type="submit">Salvar Dados</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
