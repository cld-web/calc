<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Parquímetro</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        #resultado { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .erro { color: #721c24; background: #f8d7da; padding: 10px; border-radius: 4px; }
        .sucesso { color: #155724; background: #d4edda; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Parquímetro</h2>
    <p>Insira o valor (R$):</p>
    <input type="number" id="valor" step="0.01" placeholder="Ex: 3.50">
    <button onclick="interfaceParquimetro.calcular()">Confirmar Depósito</button>
    
    <div id="resultado"></div>
</div>

<script src="app.js"></script>
</body>
</html>
