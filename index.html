<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        input { padding: 10px; width: 60px; }
        button { padding: 10px 20px; cursor: pointer; }
        .mensagem { font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Jogo de Adivinhação</h1>

    <p>Tente adivinhar o número secreto entre 1 e 100. Você tem um número limitado de tentativas!</p>

    <input type="number" id="palpite" placeholder="00">

    <button id="btnChutar">Chutar</button>

    <p id="mensagemFeedback" class="mensagem"></p>

    <p>Tentativas restantes: <span id="tentativas">10</span></p>

</body>
</html>
